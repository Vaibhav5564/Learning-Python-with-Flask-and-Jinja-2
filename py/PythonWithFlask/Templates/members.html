{% extends "base.html" %}

{% block content %}

<h1>Members List</h1>
<hr>

<table class="table table-striped table-dark">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Date</th>
    <th>Fav. Color</th>
    <th>Action</th>
</tr>

{% for member in members %}

<tr>
       <td>{{ member.id }}</td>
       <td>{{ member.name }}</td>
       <td>{{ member.email }}</td>
       <td>{{ member.date_added }}</td>
       <td>{{ member.color }}</td>

       <td>
            <a href="{{ url_for('update', id=member.id) }}" 
               class="btn btn-warning btn-sm">
               Update
            </a>
       </td>

</tr>

{% endfor %}

</table>

{% endblock %}
